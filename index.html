<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Allenamenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #141816;
    --board: #1D2320;
    --board-alt: #232A26;
    --line: rgba(242,240,233,0.13);
    --chalk: #F2F0E9;
    --chalk-dim: #98A199;
    --orange: #FF7A45;
    --orange-dim: rgba(255,122,69,0.15);
    --teal: #2FC7A3;
    --teal-dim: rgba(47,199,163,0.15);
    --yellow: #F2C14E;
    --red: #E1615C;
    --radius: 12px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.02), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,255,255,0.02), transparent 40%);
  }
  .app{ max-width: 880px; margin: 0 auto; padding: 28px 18px 60px; }

  /* Header */
  .topbar{ margin-bottom: 22px; }
  .topbar h1{
    font-family:'Oswald', sans-serif;
    font-size: 30px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0;
    font-weight: 700;
  }
  .topbar .subtitle{
    margin: 4px 0 0;
    color: var(--chalk-dim);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .topbar .subtitle span.o{ color: var(--orange); }
  .topbar .subtitle span.t{ color: var(--teal); }

  /* Tabs */
  .tabs{
    display:flex;
    gap: 4px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  .tab{
    background:none;
    border:none;
    color: var(--chalk-dim);
    font-family:'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 10px 16px 12px;
    cursor:pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s ease, border-color .15s ease;
  }
  .tab:hover{ color: var(--chalk); }
  .tab.active{ color: var(--chalk); }
  .tab[data-tab="corsa"].active{ border-color: var(--orange); }
  .tab[data-tab="crossfit"].active{ border-color: var(--teal); }
  .tab[data-tab="stats"].active{ border-color: var(--yellow); }

  .tab-panel{ display:none; animation: fadeIn .25s ease; }
  .tab-panel.active{ display:block; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(4px);} to{opacity:1; transform:none;} }

  @media (prefers-reduced-motion: reduce){
    .tab-panel{ animation:none; }
  }

  /* Board / card */
  .board{
    background: var(--board);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
  }

  .board h2{
    font-family:'Oswald', sans-serif;
    font-size: 17px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0 0 16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot.orange{ background: var(--orange); }
  .dot.teal{ background: var(--teal); }
  .dot.yellow{ background: var(--yellow); }

  /* Forms */
  .form-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }
  label{
    display:block;
    font-size: 11px;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--chalk-dim);
    margin-bottom: 6px;
  }
  input, select, textarea{
    width: 100%;
    background: var(--board-alt);
    border: 1px solid var(--line);
    border-radius: 7px;
    color: var(--chalk);
    padding: 9px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
  }
  input:focus, select:focus, textarea:focus{
    outline: none;
    border-color: var(--chalk-dim);
  }
  textarea{ resize: vertical; min-height: 54px; }
  .mono-input{ font-family:'Space Mono', monospace; }

  button.primary{
    font-family:'Oswald', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 13px;
    border:none;
    border-radius: 7px;
    padding: 11px 18px;
    cursor:pointer;
    color: #12140F;
    font-weight: 600;
    transition: filter .15s ease, transform .1s ease;
  }
  button.primary:hover{ filter: brightness(1.08); }
  button.primary:active{ transform: scale(.98); }
  .btn-orange{ background: var(--orange); }
  .btn-teal{ background: var(--teal); }
  .btn-yellow{ background: var(--yellow); }

  button.ghost{
    background: none;
    border: 1px dashed var(--line);
    color: var(--chalk-dim);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 12px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  button.ghost:hover{ color: var(--chalk); border-color: var(--chalk-dim); }

  button.icon-btn{
    background:none;
    border:none;
    color: var(--red);
    cursor:pointer;
    font-size: 16px;
    padding: 2px 6px;
    line-height:1;
  }
  button.icon-btn:hover{ opacity: .75; }

  /* Exercise rows */
  .exercise-row{
    display:grid;
    grid-template-columns: 1.4fr .7fr 1fr 1.3fr auto;
    gap: 8px;
    margin-bottom: 8px;
    align-items:end;
  }
  .exercise-row label{ margin-bottom:4px; }
  @media (max-width: 640px){
    .exercise-row{ grid-template-columns: 1fr 1fr; }
  }

  .result-fields{
    background: rgba(0,0,0,0.18);
    border-radius: 8px;
    padding: 14px;
    margin: 10px 0 16px;
  }

  /* Entry list */
  .entry-list{ display:flex; flex-direction:column; gap:10px; }
  .entry{
    background: var(--board-alt);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 13px 14px;
  }
  .entry-top{
    display:flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .entry-date{
    font-family:'Space Mono', monospace;
    font-size: 12px;
    color: var(--chalk-dim);
  }
  .entry-stats{
    display:flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 8px;
    font-family:'Space Mono', monospace;
    font-size: 13px;
  }
  .entry-stats .stat-label{
    color: var(--chalk-dim);
    font-family:'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
    display:block;
    margin-bottom: 2px;
  }
  .badge{
    font-family:'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: .8px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.fortime{ background: var(--orange-dim); color: var(--orange); }
  .badge.amrap{ background: var(--teal-dim); color: var(--teal); }
  .badge.emom{ background: rgba(242,193,78,0.15); color: var(--yellow); }

  .wod-desc{ margin: 8px 0; font-size: 14px; color: var(--chalk); }
  .exercise-list{ list-style:none; padding:0; margin: 8px 0; display:flex; flex-direction:column; gap:5px; }
  .exercise-list li{
    font-size: 13px;
    display:flex;
    gap: 8px;
    align-items:baseline;
    flex-wrap: wrap;
  }
  .exercise-list li::before{
    content:'●';
    color: var(--teal);
    font-size: 8px;
  }
  .ex-name{ font-weight: 600; }
  .ex-weight{ font-family:'Space Mono', monospace; color: var(--yellow); }
  .ex-scaling{ color: var(--chalk-dim); font-size: 12px; font-style: italic; }

  .led{
    display:inline-block;
    background: #0B0D0B;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 12px;
    font-family:'Space Mono', monospace;
    font-size: 18px;
    color: var(--teal);
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(47,199,163,0.5);
    margin-top: 8px;
  }
  .notes{ margin-top: 8px; font-size: 12px; color: var(--chalk-dim); }

  .empty-state{
    text-align:center;
    padding: 30px 10px;
    color: var(--chalk-dim);
    font-size: 13px;
  }

  /* Stats Table */
  .stat-cards{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat-card{
    background: var(--board-alt);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 12px;
    text-align:center;
  }
  .stat-card .big{
    font-family:'Space Mono', monospace;
    font-size: 21px;
    color: var(--chalk);
    display:block;
  }
  .stat-card .lbl{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--chalk-dim);
    margin-top: 3px;
    display:block;
  }
  .chart-wrap{ overflow-x:auto; }
  .chart-caption{ font-size: 12px; color: var(--chalk-dim); margin-top: 6px; }
  .pr-badge{
    background: rgba(242,193,78,0.15);
    color: var(--yellow);
    font-family:'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: .8px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight:600;
  }

  .pr-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  .pr-table th, .pr-table td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .pr-table th {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    color: var(--chalk-dim);
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .pr-table td.weight-cell {
    font-family: 'Space Mono', monospace;
    color: var(--chalk);
  }
  .pr-table td.rm-cell {
    font-family: 'Space Mono', monospace;
    color: var(--yellow);
    font-weight: 600;
  }
  .pr-table td.date-cell {
    font-family: 'Space Mono', monospace;
    color: var(--chalk-dim);
    font-size: 11px;
  }
  .pr-table tr:hover {
    background: rgba(255,255,255,0.02);
  }

  .source-badge {
    font-size: 9px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }
  .source-badge.manual { background: rgba(242,193,78,0.12); color: var(--yellow); }
  .source-badge.wod { background: rgba(47,199,163,0.12); color: var(--teal); }

  .row-inline{ display:flex; gap: 12px; align-items:flex-end; flex-wrap: wrap; margin-bottom: 14px; }
  .row-inline .field{ flex: 1; min-width: 180px; }

  ::-webkit-scrollbar{ height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1>Registro Allenamenti</h1>
    <p class="subtitle"><span class="o">Corsa</span> &nbsp;&middot;&nbsp; <span class="t">Crossfit</span></p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="corsa">Corsa</button>
    <button class="tab" data-tab="crossfit">Crossfit</button>
    <button class="tab" data-tab="stats">Statistiche</button>
  </nav>

  <main>
    <section id="tab-corsa" class="tab-panel active">
      <div class="board">
        <h2><span class="dot orange"></span>Nuovo allenamento</h2>
        <form id="runForm">
          <div class="form-grid">
            <div>
              <label for="runDate">Data</label>
              <input type="date" id="runDate" required>
            </div>
            <div>
              <label for="runKm">Km</label>
              <input type="number" id="runKm" step="0.01" min="0" placeholder="10.5" required>
            </div>
            <div>
              <label for="runPace">Passo medio (min/km)</label>
              <input type="text" id="runPace" class="mono-input" placeholder="5:30" pattern="^\d{1,2}:\d{2}$" title="Formato mm:ss, es. 5:30">
            </div>
            <div>
              <label for="runHr">Battiti medi (bpm)</label>
              <input type="number" id="runHr" min="0" placeholder="150">
            </div>
            <div>
              <label for="runCal">Calorie</label>
              <input type="number" id="runCal" min="0" placeholder="620">
            </div>
          </div>
          <button type="submit" class="primary btn-orange">Salva allenamento</button>
        </form>
      </div>

      <div class="board">
        <h2><span class="dot orange"></span>Storico corse</h2>
        <div id="runList" class="entry-list"></div>
      </div>
    </section>

    <section id="tab-crossfit" class="tab-panel">
      <div class="board">
        <h2><span class="dot teal"></span>Nuovo WOD</h2>
        <form id="wodForm">
          <div class="form-grid">
            <div>
              <label for="wodDate">Data</label>
              <input type="date" id="wodDate" required>
            </div>
            <div>
              <label for="wodType">Tipo WOD</label>
              <select id="wodType">
                <option value="fortime">For Time</option>
                <option value="amrap">AMRAP</option>
                <option value="emom">EMOM</option>
              </select>
            </div>
          </div>
          <label for="wodDesc">Descrizione WOD</label>
          <textarea id="wodDesc" placeholder="es. 21-15-9 Thrusters + Pull-ups"></textarea>

          <div style="margin-top:16px;">
            <label style="margin-bottom:10px;">Esercizi</label>
            <div id="exerciseRows"></div>
            <button type="button" id="addExerciseBtn" class="ghost">+ Aggiungi esercizio</button>
          </div>

          <div class="result-fields" id="resultFields"></div>

          <label for="wodNotes">Note generali</label>
          <textarea id="wodNotes" placeholder="Come ti sei sentito, sensazioni, ecc."></textarea>

          <button type="submit" class="primary btn-teal" style="margin-top:14px;">Salva WOD</button>
        </form>
      </div>

      <div class="board">
        <h2><span class="dot teal"></span>Storico WOD</h2>
        <div id="wodList" class="entry-list"></div>
      </div>
    </section>

    <section id="tab-stats" class="tab-panel">
      <div class="board">
        <h2><span class="dot orange"></span>Corsa</h2>
        <div id="runStats"></div>
      </div>

      <div class="board">
        <h2><span class="dot yellow"></span>Inserimento Manuale Massimali / RM</h2>
        <form id="pbManualForm">
          <div class="form-grid">
            <div>
              <label for="pbDate">Data</label>
              <input type="date" id="pbDate" required>
            </div>
            <div>
              <label for="pbName">Esercizio</label>
              <input type="text" id="pbName" list="exerciseNames" placeholder="es. Back Squat" required>
            </div>
            <div>
              <label for="pbWeight">Peso (kg)</label>
              <input type="number" id="pbWeight" step="0.5" min="0" placeholder="100" required>
            </div>
            <div>
              <label for="pbReps">Tipo RM (Reps)</label>
              <select id="pbReps">
                <option value="1">1-RM (Massimale)</option>
                <option value="2">2-RM</option>
                <option value="3">3-RM</option>
                <option value="4">4-RM</option>
                <option value="5">5-RM</option>
                <option value="6">6-RM</option>
                <option value="8">8-RM</option>
                <option value="10">10-RM</option>
              </select>
            </div>
          </div>
          <div style="margin-bottom: 14px;">
            <span style="font-size: 11px; color: var(--chalk-dim); text-transform: uppercase; display: block; margin-bottom: 4px;">Anteprima Stima 1-RM</span>
            <div id="pbPreviewOneRM" style="font-family: 'Space Mono', monospace; color: var(--yellow); font-size: 15px; font-weight: bold;">-- kg</div>
          </div>
          <button type="submit" class="primary btn-yellow">Salva Record</button>
        </form>
      </div>

      <div class="board">
        <h2><span class="dot yellow"></span>Tutti i Tuoi Massimali & Stime 1-RM</h2>
        <div id="globalPrTableContainer"></div>
      </div>

      <div class="board">
        <h2><span class="dot teal"></span>Crossfit &mdash; progressi sui pesi storici</h2>
        <div class="row-inline">
          <div class="field">
            <label for="exerciseSelect">Esercizio</label>
            <select id="exerciseSelect"></select>
          </div>
        </div>
        <div id="wodStats"></div>
      </div>
    </section>
  </main>
</div>

<datalist id="exerciseNames"></datalist>

<script>
    (function(){
      // --- INSERISCI QUI I TUOI DATI DI SUPABASE ---
      const SUPABASE_URL = "https://jyejxdxwrlifdgdoxnkx.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5ZWp4ZHh3cmxpZmRnZG94bmt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MzMwNjEsImV4cCI6MjA5OTUwOTA2MX0.OfR-joJS_eq0nJnarlR22yapu0foPRRTSp2mrnyzcl8";
      
      // Inizializzazione del client Supabase
      let supabase = null;
      if(!SUPABASE_URL.includes("XYZ_IL_TUO_ID")) {
        supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    
      let state = { runs: [], wods: [], pbs: [] };
    
      const $ = (sel, ctx) => (ctx||document).querySelector(sel);
      const $$ = (sel, ctx) => Array.from((ctx||document).querySelectorAll(sel));
    
      function todayStr(){
        const d = new Date();
        return d.toISOString().slice(0,10);
      }
    
      function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    
      function fmtDate(iso){
        if(!iso) return '&mdash;';
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' });
      }

      // Formula di Epley per il calcolo dell'1-RM Teorico: Peso * (1 + (Reps / 30))
      function calculateOneRM(weight, reps) {
        if (!weight) return 0;
        if (!reps || isNaN(reps) || reps <= 1) return weight;
        return weight * (1 + (reps / 30));
      }

      function parseReps(repsStr) {
        if (!repsStr) return 1;
        const match = repsStr.trim().toLowerCase().match(/^([0-9]+)/);
        if (match) return parseInt(match[1]) || 1;
        return 1;
      }
    
      // Caricamento dati da Supabase
      async function loadState(){
        try{
          if(!supabase) {
            console.warn("Sostituisci SUPABASE_URL e SUPABASE_ANON_KEY con le tue credenziali di Supabase.");
            return;
          }
          const { data: runsData } = await supabase.from('runs').select('*').order('date', { ascending: false });
          const { data: wodsData } = await supabase.from('wods').select('*').order('date', { ascending: false });
          
          // Tabella 'pbs' per i record manuali (se non esiste sul tuo db, verrà usata localmente)
          let pbsData = [];
          try {
            const { data } = await supabase.from('pbs').select('*').order('date', { ascending: false });
            pbsData = data || [];
          } catch(e) { console.warn("Tabella 'pbs' non ancora creata su Supabase. Uso array locale."); }
    
          state.runs = runsData || [];
          state.wods = wodsData || [];
          state.pbs = pbsData || [];
        }catch(e){
          console.error('Errore nel recupero dei dati:', e);
        }
      }
    
      /* ---------- TABS ---------- */
      $$('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          $$('.tab').forEach(t => t.classList.remove('active'));
          $$('.tab-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          $('#tab-' + tab.dataset.tab).classList.add('active');
          if(tab.dataset.tab === 'stats'){ renderStats(); }
        });
      });
    
      /* ---------- LOGICA CORSA ---------- */
      const runForm = $('#runForm');
      if($('#runDate')) $('#runDate').value = todayStr();
    
      if(runForm) {
        runForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const entry = {
            id: uid(),
            date: $('#runDate').value,
            km: parseFloat($('#runKm').value),
            pace: $('#runPace').value.trim(),
            hr: $('#runHr').value ? parseInt($('#runHr').value) : null,
            cal: $('#runCal').value ? parseInt($('#runCal').value) : null
          };
      
          if(supabase) await supabase.from('runs').insert([entry]);
          state.runs.push(entry);
          renderRuns();
          runForm.reset();
          $('#runDate').value = todayStr();
        });
      }
    
      function renderRuns(){
        const list = $('#runList');
        if(!list) return;
        const sorted = [...state.runs].sort((a,b) => b.date.localeCompare(a.date));
        if(sorted.length === 0){
          list.innerHTML = '<div class="empty-state">Nessuna corsa registrata.</div>';
          return;
        }
        list.innerHTML = sorted.map(r => `
          <div class="entry" data-id="${r.id}">
            <div class="entry-top">
              <span class="entry-date">${fmtDate(r.date)}</span>
              <button class="icon-btn" data-delete-run="${r.id}">&times;</button>
            </div>
            <div class="entry-stats">
              <div><span class="stat-label">Km</span>${r.km ?? '&mdash;'}</div>
              <div><span class="stat-label">Passo</span>${r.pace || '&mdash;'}</div>
              <div><span class="stat-label">Battiti</span>${r.hr ?? '&mdash;'}</div>
              <div><span class="stat-label">Calorie</span>${r.cal ?? '&mdash;'}</div>
            </div>
          </div>
        `).join('');
    
        $$('[data-delete-run]', list).forEach(btn => {
          btn.addEventListener('click', async () => {
            const idToDelete = btn.dataset.deleteRun;
            if(supabase) await supabase.from('runs').delete().eq('id', idToDelete);
            state.runs = state.runs.filter(r => r.id !== idToDelete);
            renderRuns();
          });
        });
      }
    
      /* ---------- LOGICA CROSSFIT ---------- */
      const wodForm = $('#wodForm');
      if($('#wodDate')) $('#wodDate').value = todayStr();
      const exerciseRows = $('#exerciseRows');
      const resultFields = $('#resultFields');
      const wodTypeSelect = $('#wodType');
    
      function exerciseRowTemplate(){
        const div = document.createElement('div');
        div.className = 'exercise-row';
        div.innerHTML = `
          <div><label>Esercizio</label><input type="text" class="ex-name-input" list="exerciseNames" placeholder="es. Clean"></div>
          <div><label>Peso (kg)</label><input type="number" class="ex-weight-input" step="0.5" min="0" placeholder="50"></div>
          <div><label>Reps / Scheme</label><input type="text" class="ex-reps-input" placeholder="2"></div>
          <div><label>Scalatura / Note</label><input type="text" class="ex-scaling-input" placeholder="Note"></div>
          <button type="button" class="icon-btn" data-remove-row>&times;</button>
        `;
        div.querySelector('[data-remove-row]').addEventListener('click', () => {
          if(exerciseRows.children.length > 1) div.remove();
          else div.querySelectorAll('input').forEach(i => i.value = '');
        });
        return div;
      }
    
      if($('#addExerciseBtn')) {
        $('#addExerciseBtn').addEventListener('click', () => { exerciseRows.appendChild(exerciseRowTemplate()); });
      }
    
      function renderResultFields(){
        if(!resultFields || !wodTypeSelect) return;
        const type = wodTypeSelect.value;
        if(type === 'fortime'){
          resultFields.innerHTML = `<label for="resTime">Tempo risultato (mm:ss)</label><input type="text" id="resTime" class="mono-input" placeholder="12:45">`;
        } else if(type === 'amrap'){
          resultFields.innerHTML = `
            <div class="form-grid">
              <div><label for="resRounds">Round completati</label><input type="number" id="resRounds" min="0" placeholder="7"></div>
              <div><label for="resExtraReps">Rep extra</label><input type="number" id="resExtraReps" min="0" placeholder="5"></div>
            </div>`;
        } else if(type === 'emom'){
          resultFields.innerHTML = `
            <div class="form-grid">
              <div><label for="resDuration">Durata (min)</label><input type="number" id="resDuration" min="0" placeholder="20"></div>
              <div><label for="resEmomRounds">Round completati</label><input type="number" id="resEmomRounds" min="0" placeholder="20"></div>
            </div>`;
        }
      }
      if(wodTypeSelect) wodTypeSelect.addEventListener('change', renderResultFields);
    
      function collectResult(){
        const type = wodTypeSelect.value;
        if(type === 'fortime') return { type, time: $('#resTime') ? $('#resTime').value.trim() : '' };
        if(type === 'amrap') return { type, rounds: $('#resRounds').value ? parseInt($('#resRounds').value) : null, extraReps: $('#resExtraReps').value ? parseInt($('#resExtraReps').value) : null };
        if(type === 'emom') return { type, duration: $('#resDuration').value ? parseInt($('#resDuration').value) : null, roundsCompleted: $('#resEmomRounds').value ? parseInt($('#resEmomRounds').value) : null };
      }
    
      if(wodForm) {
        wodForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const exercises = $$('.exercise-row', exerciseRows).map(row => ({
            name: row.querySelector('.ex-name-input').value.trim(),
            weight: row.querySelector('.ex-weight-input').value ? parseFloat(row.querySelector('.ex-weight-input').value) : null,
            reps: row.querySelector('.ex-reps-input').value.trim(),
            scaling: row.querySelector('.ex-scaling-input').value.trim()
          })).filter(ex => ex.name);
      
          const entry = {
            id: uid(),
            date: $('#wodDate').value,
            type: wodTypeSelect.value,
            description: $('#wodDesc').value.trim(),
            exercises,
            result: collectResult(),
            notes: $('#wodNotes').value.trim()
          };
      
          if(supabase) await supabase.from('wods').insert([entry]);
          state.wods.push(entry);
          renderWods();
          updateExerciseDatalist();
          wodForm.reset();
          $('#wodDate').value = todayStr();
          exerciseRows.innerHTML = '';
          exerciseRows.appendChild(exerciseRowTemplate());
          renderResultFields();
        });
      }
    
      function renderWods(){
        const list = $('#wodList');
        if(!list) return;
        const sorted = [...state.wods].sort((a,b) => b.date.localeCompare(a.date));
        if(sorted.length === 0){
          list.innerHTML = '<div class="empty-state">Nessun WOD registrato.</div>';
          return;
        }
        list.innerHTML = sorted.map(w => `
          <div class="entry" data-id="${w.id}">
            <div class="entry-top">
              <span class="entry-date">${fmtDate(w.date)} <span class="badge ${w.type}">${w.type}</span></span>
              <button class="icon-btn" data-delete-wod="${w.id}">&times;</button>
            </div>
            ${w.description ? `<div class="wod-desc">${w.description}</div>` : ''}
            ${w.exercises && w.exercises.length ? `
              <ul class="exercise-list">
                ${w.exercises.map(ex => {
                  const rCount = parseReps(ex.reps);
                  const stima = (ex.weight && rCount > 1) ? ` <span style="color:var(--chalk-dim); font-size:11px;">(1-RM stim: ${calculateOneRM(ex.weight, rCount).toFixed(1)} kg)</span>` : '';
                  return `<li><span class="ex-name">${ex.name}</span> ${ex.weight ? `<span class="ex-weight">${ex.weight} kg</span>` : ''} ${ex.reps ? `<span>(${ex.reps} Reps)</span>` : ''} ${stima}</li>`;
                }).join('')}
              </ul>
            ` : ''}
            <div class="led">${w.result?.time || w.result?.rounds || w.result?.roundsCompleted || '&mdash;'}</div>
          </div>
        `).join('');
    
        $$('[data-delete-wod]', list).forEach(btn => {
          btn.addEventListener('click', async () => {
            const idToDelete = btn.dataset.deleteWod;
            if(supabase) await supabase.from('wods').delete().eq('id', idToDelete);
            state.wods = state.wods.filter(w => w.id !== idToDelete);
            renderWods();
            updateExerciseDatalist();
          });
        });
      }
    
      /* ---------- INSERIMENTO MANUALE RECORD (TAB STATS) ---------- */
      const pbManualForm = $('#pbManualForm');
      if($('#pbDate')) $('#pbDate').value = todayStr();

      function updateManualPbPreview() {
        const weight = parseFloat($('#pbWeight').value) || 0;
        const reps = parseInt($('#pbReps').value) || 1;
        const preview = $('#pbPreviewOneRM');
        if(preview) {
          const estimated = calculateOneRM(weight, reps);
          preview.textContent = estimated > 0 ? `${estimated.toFixed(1)} kg` : '-- kg';
        }
      }

      if($('#pbWeight')) $('#pbWeight').addEventListener('input', updateManualPbPreview);
      if($('#pbReps')) $('#pbReps').addEventListener('change', updateManualPbPreview);

      if(pbManualForm) {
        pbManualForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const entry = {
            id: uid(),
            date: $('#pbDate').value,
            name: $('#pbName').value.trim(),
            weight: parseFloat($('#pbWeight').value),
            reps: parseInt($('#pbReps').value)
          };

          if(supabase) {
            try { await supabase.from('pbs').insert([entry]); } catch(err){}
          }
          state.pbs.push(entry);
          pbManualForm.reset();
          $('#pbDate').value = todayStr();
          if($('#pbPreviewOneRM')) $('#pbPreviewOneRM').textContent = '-- kg';
          updateExerciseDatalist();
          renderStats();
        });
      }
    
      function updateExerciseDatalist(){
        const names = new Set();
        state.wods.forEach(w => (w.exercises||[]).forEach(ex => { if(ex.name) names.add(ex.name.trim()); }));
        state.pbs.forEach(p => { if(p.name) names.add(p.name.trim()); });
        
        const datalist = $('#exerciseNames');
        if(datalist) datalist.innerHTML = Array.from(names).sort().map(n => `<option value="${n}">`).join('');
    
        const select = $('#exerciseSelect');
        if(select) {
          const current = select.value;
          select.innerHTML = Array.from(names).sort().map(n => `<option value="${n}">${n}</option>`).join('');
          if(names.has(current)) select.value = current;
        }
      }
    
      if($('#exerciseSelect')) $('#exerciseSelect').addEventListener('change', renderWodStats);
    
      /* ---------- RENDERING STATISTICHE & GRAFICI ---------- */
      function buildLineChart(points, opts){
        opts = opts || {};
        const width = opts.width || 640; const height = opts.height || 180;
        const color = opts.color || '#2FC7A3'; const higherIsBetter = !!opts.higherIsBetter;
        const valueFormatter = opts.valueFormatter || (v => v);
        const padding = 34; const plotW = width - padding * 2; const plotH = height - padding * 2;
    
        if(points.length === 0) return '<div class="empty-state">Nessun dato.</div>';
        const ys = points.map(p => p.y);
        let yMin = Math.min(...ys); let yMax = Math.max(...ys);
        if(yMin === yMax){ yMin -= 1; yMax += 1; }
        const xStep = points.length > 1 ? plotW / (points.length - 1) : 0;
    
        function yPixel(v){
          const norm = (v - yMin) / (yMax - yMin);
          return higherIsBetter ? (padding + plotH - norm * plotH) : (padding + norm * plotH);
        }
        const coords = points.map((p, i) => [padding + i * xStep, yPixel(p.y)]);
        const pathD = coords.map((c, i) => (i === 0 ? 'M' : 'L') + c[0].toFixed(1) + ',' + c[1].toFixed(1)).join(' ');
        const bestIdx = higherIsBetter ? ys.indexOf(Math.max(...ys)) : ys.indexOf(Math.min(...ys));
    
        const dots = coords.map((c, i) => `
          <circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${i === bestIdx ? 5 : 3.5}" fill="${i === bestIdx ? '#F2C14E' : color}">
            <title>${fmtDate(points[i].x)}: ${valueFormatter(points[i].y)}</title>
          </circle>`).join('');
    
        return `
          <svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible;">
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${padding+plotH}" stroke="var(--line)" stroke-width="1"/>
            <line x1="${padding}" y1="${padding+plotH}" x2="${padding+plotW}" y2="${padding+plotH}" stroke="var(--line)" stroke-width="1"/>
            <text x="${padding-6}" y="${padding+4}" font-size="10" fill="var(--chalk-dim)" text-anchor="end" font-family="Space Mono, monospace">${valueFormatter(yMax)}</text>
            <text x="${padding-6}" y="${padding+plotH+4}" font-size="10" fill="var(--chalk-dim)" text-anchor="end" font-family="Space Mono, monospace">${valueFormatter(yMin)}</text>
            <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2"/>
            ${dots}
          </svg>
        `;
      }
    
      function renderRunStats(){
        const container = $('#runStats');
        if(!container) return;
        if(state.runs.length === 0){
          container.innerHTML = '<div class="empty-state">Aggiungi qualche corsa per vedere i dati.</div>';
          return;
        }
        const totalKm = state.runs.reduce((sum, r) => sum + (r.km || 0), 0);
        container.innerHTML = `
          <div class="stat-cards">
            <div class="stat-card"><span class="big">${totalKm.toFixed(1)}</span><span class="lbl">Km totali</span></div>
            <div class="stat-card"><span class="big">${state.runs.length}</span><span class="lbl">Allenamenti</span></div>
          </div>`;
      }

      // Elabora e unisce sia i PR dei WOD che gli inserimenti manuali in un'unica super-tabella
      function renderGlobalPrTable() {
        const container = $('#globalPrTableContainer');
        if(!container) return;

        const combinedMap = new Map(); // key -> { name, maxWeight, reps, oneRM, date, source }

        // 1. Processa dati dai WOD storici
        state.wods.forEach(w => {
          (w.exercises || []).forEach(ex => {
            if(ex.name && ex.weight) {
              const key = ex.name.trim().toLowerCase();
              const rCount = parseReps(ex.reps);
              const computedOneRM = calculateOneRM(ex.weight, rCount);

              const existing = combinedMap.get(key);
              if(!existing || computedOneRM > existing.oneRM) {
                combinedMap.set(key, {
                  name: ex.name.trim(),
                  maxWeight: ex.weight,
                  reps: rCount,
                  oneRM: computedOneRM,
                  date: w.date,
                  source: 'wod'
                });
              }
            }
          });
        });

        // 2. Processa dati inseriti manualmente (se superiori, aggiorna o aggiunge)
        state.pbs.forEach(p => {
          if(p.name && p.weight) {
            const key = p.name.trim().toLowerCase();
            const computedOneRM = calculateOneRM(p.weight, p.reps);

            const existing = combinedMap.get(key);
            if(!existing || computedOneRM > existing.oneRM) {
              combinedMap.set(key, {
                name: p.name.trim(),
                maxWeight: p.weight,
                reps: p.reps,
                oneRM: computedOneRM,
                date: p.date,
                source: 'manual'
              });
            }
          }
        });

        const sortedPrs = Array.from(combinedMap.values()).sort((a,b) => a.name.localeCompare(b.name));

        if(sortedPrs.length === 0) {
          container.innerHTML = '<div class="empty-state">Nessun massimale registrato o inserito manualmente.</div>';
          return;
        }

        container.innerHTML = `
          <table class="pr-table">
            <thead>
              <tr>
                <th>Esercizio</th>
                <th>Miglior Peso / RM Reale</th>
                <th>Stima 1-RM</th>
                <th>Data</th>
                <th>Fonte</th>
                <th>Azione</th>
              </tr>
            </thead>
            <tbody>
              ${sortedPrs.map(item => `
                <tr>
                  <td><strong>${item.name}</strong></td>
                  <td class="weight-cell">${item.maxWeight} kg <span style="font-size:11px; color:var(--chalk-dim)">@ ${item.reps}RM</span></td>
                  <td class="rm-cell">${item.oneRM.toFixed(1)} kg</td>
                  <td class="date-cell">${fmtDate(item.date)}</td>
                  <td><span class="source-badge ${item.source}">${item.source === 'manual' ? 'Manuale' : 'Dai WOD'}</span></td>
                  <td>
                    ${item.source === 'manual' ? `<button class="icon-btn" data-delete-pb-name="${item.name}" title="Elimina record manuale">&times;</button>` : '&mdash;'}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        // Gestione eliminazione dei record manuali direttamente dalla tabella
        $$('[data-delete-pb-name]', container).forEach(btn => {
          btn.addEventListener('click', async () => {
            const nameToDel = btn.dataset.deletePbName;
            if(supabase) {
              try { await supabase.from('pbs').delete().eq('name', nameToDel); } catch(e){}
            }
            state.pbs = state.pbs.filter(p => p.name.trim().toLowerCase() !== nameToDel.toLowerCase());
            renderStats();
          });
        });
      }
    
      function renderWodStats(){
        const container = $('#wodStats');
        if(!container) return;
        const select = $('#exerciseSelect');
        const exerciseName = select ? select.value : '';
    
        if(!exerciseName){
          container.innerHTML = '<div class="empty-state">Seleziona un esercizio per vederne la curva di crescita.</div>';
          return;
        }
    
        const points = [];
        // Rileva tutti i punti storici per l'esercizio combinando WOD e inserimenti manuali
        state.wods.forEach(w => {
          (w.exercises || []).forEach(ex => {
            if(ex.name.trim().toLowerCase() === exerciseName.trim().toLowerCase() && ex.weight){
              const rCount = parseReps(ex.reps);
              points.push({ x: w.date, y: calculateOneRM(ex.weight, rCount) });
            }
          });
        });
        state.pbs.forEach(p => {
          if(p.name.trim().toLowerCase() === exerciseName.trim().toLowerCase() && p.weight) {
            points.push({ x: p.date, y: calculateOneRM(p.weight, p.reps) });
          }
        });

        points.sort((a,b) => a.x.localeCompare(b.x));
    
        if(points.length === 0){
          container.innerHTML = '<div class="empty-state">Nessun peso registrato per questo esercizio.</div>';
          return;
        }
    
        const maxWeight = Math.max(...points.map(p => p.y));
    
        let html = `
          <div class="stat-cards">
            <div class="stat-card"><span class="big">${maxWeight.toFixed(1)} kg</span><span class="lbl">Miglior 1-RM Raggiunto</span></div>
            <div class="stat-card"><span class="big">${points.length}</span><span class="lbl">Sessioni registrate</span></div>
          </div>
        `;
    
        if(points.length >= 2){
          html += `
            <div class="chart-wrap">
              ${buildLineChart(points, { color: '#2FC7A3', higherIsBetter: true, valueFormatter: v => v.toFixed(1) + ' kg' })}
            </div>
          `;
        }
        container.innerHTML = html;
      }
    
      function renderStats(){
        renderRunStats();
        renderGlobalPrTable();
        renderWodStats();
      }
    
      /* ---------- INIT ---------- */
      async function init(){
        if(exerciseRows) exerciseRows.appendChild(exerciseRowTemplate());
        renderResultFields();
        renderRuns();
        renderWods();
        updateExerciseDatalist();
    
        await loadState(); 
        
        renderRuns();
        renderWods();
        updateExerciseDatalist();
        renderStats();
      }
      init();
    })();
    </script>
</body>
</html>
